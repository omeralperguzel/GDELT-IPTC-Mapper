<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>GDELT → IPTC Mapping</title>
    <link rel="stylesheet" href="/static/css/tab_style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>GDELT Theme → IPTC Media Topics Mapping</h1>
            <p class="methodology">Cosine Similarity • IPTC NewsCodes (17 Categories)</p>
        </header>

        <div class="config-panel">
            <h3 style="color: #0f3460; margin-bottom: 15px;">⚙️ GDELT & IPTC Analiz Parametreleri</h3>
            <div class="config-grid">
                <div class="config-group">
                    <label for="min-docs-threshold">Min. Doküman Eşiği:</label>
                    <input type="number" id="min-docs-threshold" min="0" max="100000" value="1000" title="Minimum toplam doküman sayısı filtresi">
                </div>
                <div class="config-group">
                    <label for="quality-threshold">Min. Kalite Oranı (%):</label>
                    <input type="number" id="quality-threshold" min="0" max="100" value="50" title="Minimum aylık kalite oranı">
                </div>
                <div class="config-group">
                    <label for="similarity-threshold">Min. Benzerlik Skoru:</label>
                    <input type="number" id="similarity-threshold" min="0" max="1" step="0.01" value="0.30" title="IPTC eşleştirme minimum benzerlik">
                </div>
                <div class="config-group">
                    <label for="iptc-filter-param">IPTC Kategori Filtresi:</label>
                    <select id="iptc-filter-param">
                        <option value="all">Tüm Kategoriler (17)</option>
                        <option value="economy, business and finance">💰 Economy</option>
                        <option value="conflict, war and peace">⚔️ Conflict</option>
                        <option value="politics and government">🏛️ Politics</option>
                        <option value="health">🏥 Health</option>
                        <option value="education">📚 Education</option>
                        <option value="disaster, accident and emergency incident">🚨 Disaster</option>
                        <option value="environment">🌍 Environment</option>
                    </select>
                </div>
            </div>
            <div class="config-buttons">
                <button class="run-btn" id="run-analysis-btn" onclick="applyGDELTFilters()">🔍 Filtreleri Uygula</button>
                <button class="run-btn" style="background: #6c757d;" id="reset-btn" onclick="resetGDELTFilters()">🔄 Sıfırla</button>
                <span style="margin: 0 10px; color: #999;">|</span>
                <button class="run-btn" style="background: #28a745;" id="save-btn" title="Mevcut analizi kaydet" onclick="saveGDELTAnalysis()">💾 Kaydet</button>
                <button class="run-btn" style="background: #17a2b8;" id="manage-analyses-btn" title="Kaydedilmiş analizleri yönet" onclick="showSavedAnalysesManager()">📂 Analizler</button>
                <button class="run-btn" style="background: #17a2b8;" id="import-btn" title="Dosyadan içe aktar" onclick="triggerImport()">📥 İçe Aktar</button>
                <input type="file" id="import-file-input" accept=".json" style="display: none;" onchange="handleGDELTImportFile(event)">
            </div>
            <div class="status-message" id="config-status"></div>
        </div>

        <div class="tabs-container">
            <button class="tab-button active" data-tab="gdelt">📰 GDELT Tema</button>
            <button class="tab-button" data-tab="charts">📈 Grafikler</button>
            <button class="tab-button" data-tab="clustering">🤖 Kümeleme</button>
            <button class="tab-button" data-tab="export">📤 Dışarı Aktar</button>
        </div>

        <main>
            <div id="tab-gdelt" class="tab-content active" data-partial="/tabs/tab-gdelt.html"></div>
            <div id="tab-clustering" class="tab-content" data-partial="/tabs/tab-clustering.html"></div>
            <div id="tab-charts" class="tab-content" data-partial="/tabs/tab-charts.html"></div>
            <div id="tab-export" class="tab-content" data-partial="/tabs/tab-export.html"></div>
        </main>

        <div id="status-message" class="status-message" aria-live="polite" role="status" style="display:block; margin-top:12px;">Ready</div>
    </div>

    <!-- Load global runtime; per-part JS files are loaded by the partial loader in script.js -->
    <script src="/static/js/script.js" defer></script>
</body>
</html>
